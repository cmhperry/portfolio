<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled — Animated Short | Perry Chu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:#0E0F12;
    --bg-alt:#1A1B1F;
    --ink:#F2F1EC;
    --ink-soft:#9A9CA3;
    --line:#2A2C31;
    --line-strong:#44474E;
    --accent:#5B84FF;
    --accent-soft:rgba(91,132,255,0.12);
    --gap:clamp(1.25rem, 3vw, 2.5rem);
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-size:16px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2{ font-family:'Space Grotesk', sans-serif; margin:0; letter-spacing:-0.01em; }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--accent-soft); color:var(--ink); }

  .mono{
    font-family:'IBM Plex Mono', monospace;
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .wrap{
    max-width:1000px;
    margin:0 auto;
    padding:0 var(--gap);
  }

  header{
    border-bottom:1px solid var(--line);
    padding:1.4rem var(--gap);
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:0.5rem;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.75rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    transition:color 0.2s ease;
  }
  .back-link:hover{ color:var(--accent); }
  .back-link svg{ width:14px; height:14px; }

  .project-hero{
    padding:clamp(3rem, 7vw, 5rem) 0 clamp(2rem, 5vw, 3rem);
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    gap:0.6em;
    margin-bottom:1rem;
  }
  .eyebrow::before{
    content:"";
    width:6px; height:6px;
    background:var(--accent);
    display:inline-block;
    border-radius:1px;
  }
  .project-hero h1{
    font-size:clamp(2.2rem, 5vw, 3.4rem);
    margin-bottom:0.8rem;
  }
  .project-hero p{
    color:var(--ink-soft);
    font-size:1.02rem;
    max-width:56ch;
  }

  .deck-section{ padding-bottom:clamp(3rem, 7vw, 5rem); }
  .deck-embed{
    border:1px solid var(--line-strong);
    padding:12px;
    background:var(--bg-alt);
  }
  .deck-embed iframe{
    display:block;
    border:0;
    width:100%;
    height:auto;
    aspect-ratio:960/569;
    border-radius:6px;
  }

  footer{
    border-top:1px solid var(--line);
    padding:1.6rem var(--gap);
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.06em;
    text-align:center;
  }

</style>
</head>
<body>

<header>
  <div class="wrap" style="padding:0;">
    <a href="index.html#storyboard" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      Back to Portfolio
    </a>
  </div>
</header>

<main class="wrap">

  <section class="project-hero">
    <p class="eyebrow">Personal Project</p>
    <h1>Untitled</h1>
    <p>Animated Short — storyboard sequence.</p>
  </section>

  <section class="deck-section">
    <div class="deck-embed">
      <iframe src="https://docs.google.com/presentation/d/145GX0oq_u2fpwHZViHgHQivpxLlz2xNw/embed?start=false&amp;loop=false&amp;delayms=3000"
        title="Untitled — Storyboard Sequence"
        allowfullscreen="true"></iframe>
    </div>
  </section>

</main>

<footer>
  © 2026 Perry Chu
</footer>

</body>
</html>
